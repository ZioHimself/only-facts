name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Verify jest-util
        run: |
          ls -la node_modules/jest-util/
          cat node_modules/jest-util/package.json | head -5

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
        working-directory: packages/engine

      - name: Test with coverage
        run: npm run test:coverage -w @only-facts/engine

      - name: Build
        run: npm run build
