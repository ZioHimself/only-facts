name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci

      - name: Verify critical packages
        run: |
          test -f node_modules/jest-util/package.json || (echo "jest-util missing!" && exit 1)
          test -f node_modules/source-map-support/source-map-support.js || (echo "source-map-support missing!" && exit 1)

      - name: Lint
        run: npm run lint

      - name: Type check (engine)
        run: npx tsc --noEmit
        working-directory: packages/engine

      - name: Type check (reports)
        run: npx tsc --noEmit
        working-directory: packages/reports

      - name: Test with coverage
        run: npm run test:coverage -w @only-facts/engine

      - name: Build
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Install dependencies
        run: npm ci

      - name: Build and push Engine Docker image
        run: |
          IMAGE_TAG="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/engine:${{ github.sha }}"
          IMAGE_LATEST="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/engine:latest"

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST -f packages/engine/Dockerfile .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Build and push Reports Docker image
        run: |
          IMAGE_TAG="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/reports:${{ github.sha }}"
          IMAGE_LATEST="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/reports:latest"

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST -f packages/reports/Dockerfile .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: only-facts-gke-prod
          location: ${{ vars.GCP_REGION }}

      - name: Deploy Engine to GKE
        run: |
          kubectl set image deployment/only-facts \
            only-facts=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/engine:${{ github.sha }} \
            -n only-facts

      - name: Deploy Reports to GKE
        run: |
          kubectl set image deployment/only-facts-reports \
            only-facts-reports=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/only-facts/reports:${{ github.sha }} \
            -n only-facts
