name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan -var-file=environments/prod.tfvars
        env:
          TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI || '' }}

      - name: Terraform Apply
        timeout-minutes: 3
        run: terraform apply -auto-approve -var-file=environments/prod.tfvars
        env:
          TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
          TF_VAR_mongo_uri: ${{ secrets.MONGO_URI || '' }}
